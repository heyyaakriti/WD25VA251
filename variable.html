<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Java Script Variable</h1>
    <script>
        //var-variable definition 
        //container in js
        //rules-1) no spaces allowed 2)lowercase name
        var myName="Abes";
        document.write(myName);
        console.log(myName);
        // js execution and scope(Global and local)
        function demo()
        {
            var eng="Thanks" //local
            console.log(eng);
        }
        demo();
        //variable declaration using let and const
        let msg="Thanks again";
        console.log(msg);
    </script>
</body>
</html>
